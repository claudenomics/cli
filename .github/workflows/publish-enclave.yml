name: publish-enclave

on:
  push:
    branches: [main]
    paths:
      - 'packages/enclave/**'
      - 'packages/logger/**'
      - 'packages/usage/**'
      - 'package.json'
      - 'package-lock.json'
      - 'tsconfig.base.json'
      - 'tsconfig.json'
      - 'docker-compose.yaml'
      - '.github/workflows/publish-enclave.yml'
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  id-token: write
  attestations: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: docker/setup-buildx-action@b5ca514318bd6ebac0fb2aedd5d36ec1b5c232a2 # v3.10.0

      - uses: docker/login-action@74a5d142397b4f367a81961eba4e8cd7edddf772 # v3.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: sigstore/cosign-installer@d7d6bc7722e3daa8354c50bcb52f4837da5e9b6a # v3.8.1

      - name: Compute tags
        id: tags
        run: echo "sha=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - id: build
        uses: docker/build-push-action@471d1dc4e07e5cdedd4c2171150001c434f0b7a4 # v6.15.0
        with:
          context: .
          file: packages/enclave/Dockerfile
          push: true
          provenance: true
          sbom: true
          tags: |
            ghcr.io/claudenomics/enclave:latest
            ghcr.io/claudenomics/enclave:${{ steps.tags.outputs.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Sign image with cosign (keyless)
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          cosign sign --yes \
            "ghcr.io/claudenomics/enclave@${DIGEST}"

      - uses: actions/attest-build-provenance@c074443f1aee8d4aeeae555aebba3282517141b2 # v2.2.3
        with:
          subject-name: ghcr.io/claudenomics/enclave
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true

  deploy-phala:
    needs: build-and-push
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event.inputs.deploy != 'false'
    concurrency:
      group: phala-deploy
      cancel-in-progress: false
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: '20'
      - run: npm install -g phala
      - name: Redeploy CVM with current compose
        env:
          PHALA_CLOUD_API_KEY: ${{ secrets.PHALA_CLOUD_API_KEY }}
        run: |
          phala deploy \
            --cvm-id "${{ vars.PHALA_CVM_ID }}" \
            -c docker-compose.yaml \
            --wait
      - name: Smoke /health
        run: |
          curl -sS --max-time 30 "${{ vars.PHALA_ENCLAVE_URL }}/health" | tee /dev/stderr | grep -q '"ok":true'
