name: publish-enclave

on:
  push:
    branches: [main]
    paths:
      - 'packages/enclave/**'
      - 'packages/logger/**'
      - 'packages/usage/**'
      - 'package.json'
      - 'package-lock.json'
      - 'tsconfig.base.json'
      - 'tsconfig.json'
      - 'docker-compose.yaml'
      - '.github/workflows/publish-enclave.yml'
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  id-token: write
  attestations: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: sigstore/cosign-installer@cad07c2e89fa2edd6e2d7bab4c1aa38e53f76003 # v4.1.1

      - name: Compute tags
        id: tags
        run: echo "sha=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - id: build
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: .
          file: packages/enclave/Dockerfile
          push: true
          provenance: true
          sbom: true
          tags: |
            ghcr.io/claudenomics/enclave:latest
            ghcr.io/claudenomics/enclave:${{ steps.tags.outputs.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Sign image with cosign (keyless)
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          cosign sign --yes \
            "ghcr.io/claudenomics/enclave@${DIGEST}"

      - uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-name: ghcr.io/claudenomics/enclave
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true

  deploy-phala:
    needs: build-and-push
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event.inputs.deploy != 'false'
    concurrency:
      group: phala-deploy
      cancel-in-progress: false
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '20'
      - run: npm install -g phala
      - name: Redeploy CVM with current compose
        env:
          PHALA_CLOUD_API_KEY: ${{ secrets.PHALA_CLOUD_API_KEY }}
        run: |
          phala deploy \
            --cvm-id "${{ vars.PHALA_CVM_ID }}" \
            -c docker-compose.yaml \
            --wait
      - name: Smoke /health
        run: |
          curl -sS --max-time 30 "${{ vars.PHALA_ENCLAVE_URL }}/health" | tee /dev/stderr | grep -q '"ok":true'
