name: publish-cli

on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - run: npm ci

      - run: npm run build

      - run: npm test

      - name: Verify tag matches package version
        run: |
          tag="${GITHUB_REF_NAME#v}"
          pkg=$(node -p "require('./app/package.json').version")
          if [ "$tag" != "$pkg" ]; then
            echo "tag v$tag does not match package version $pkg"
            exit 1
          fi

      - run: npm publish --workspace=@claudenomics/cli
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
