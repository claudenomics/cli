services:
  enclave:
    image: ghcr.io/claudenomics/enclave:latest
    restart: unless-stopped
    ports:
      - "8787:8787"
    volumes:
      - /var/run/dstack.sock:/var/run/dstack.sock
    environment:
      DEFAULT_UPSTREAM: anthropic
      DSTACK_MODE: production
      CLAUDENOMICS_JWKS_URL: https://auth.claudenomics.xyz/.well-known/jwks.json
      CLAUDENOMICS_JWT_ISSUER: https://auth.claudenomics.xyz
      PORT: "8787"
      CLAUDENOMICS_LOG: info
